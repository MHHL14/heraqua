<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herqua Schoenadviseur</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/widget.css">
  <link rel="stylesheet" href="css/scan.css">
</head>
<body>
  <div class="page-bg">
    <div id="herqua-schoenadviseur" class="widget">
      <header class="hero">
        <img class="logo" src="https://www.herqua.nl/media/logo/stores/1/LogoHerquaSports-Kleur-wit_DEF.png" alt="Herqua Sports">
        <div class="step-pill" id="step-pill">Schoenadvies · Stap 1 / 6</div>
      </header>
      <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
      <main id="widget-main"></main>
      <footer class="step-footer" id="step-footer">
        <button class="btn-back" id="btn-back" disabled>← Vorige vraag</button>
        <div class="trust-chip">
          <div class="mono-avatar" aria-hidden="true">H</div>
          <span>Advies van Herman · Herqua Hardloopexpert</span>
        </div>
      </footer>
    </div>
  </div>
  <script type="module" src="js/widget.js"></script>
</body>
</html>
